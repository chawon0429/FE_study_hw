<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에브리타임 회원가입 클론</title>
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="signup-container">
        <div class="header-section">
            <h2 class="title">에브리타임 회원가입</h2>
            <p class="subtitle">에브리타임 계정으로 캠퍼스픽, 에브리타임 등<br>다양한 대학생 서비스를 모두 이용하실 수 있습니다.</p>
        </div>

        <form id="signupForm" class="form-box">
            <div class="input-group">
                <label>이름</label>
                <input type="text" class="text-input" placeholder="이름을 입력하세요.">
            </div>
            <div class="input-group">
                <label>닉네임</label>
                <input type="text" class="text-input" placeholder="닉네임을 입력하세요.">
            </div>
            <div class="input-group">
                <label>이메일</label>
                <input type="email" class="text-input" placeholder="이메일을 입력하세요.">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="signupPw" class="text-input" placeholder="숫자/영문 조합, 최소 8자 이상">
            </div>
            <div class="input-group">
                <label>비밀번호 재확인</label>
                <input type="password" class="text-input" placeholder="비밀번호를 재입력하세요.">
            </div>
            
            <input type="submit" id="signupBtn" value="회원가입" class="submit-btn" disabled>
        </form>
    </div>

    <script src="../js/signup.js"></script>
</body>
</html>
